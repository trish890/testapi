version: '3.8'

services:
  printflow-api:
    build: .
    container_name: printflow-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./printflow.db
      - DEBUG=False
    volumes:
      - ./printflow.db:/app/printflow.db
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

